name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: python build.py

      - name: Rename exe and compute hash
        run: |
          $version = python -c "from version import VERSION; print(VERSION)"
          Move-Item "dist/servicebox-proxy-$version.exe" "dist/servicebox-proxy.exe"
          $hash = (Get-FileHash "dist/servicebox-proxy.exe" -Algorithm SHA256).Hash
          $size = (Get-Item "dist/servicebox-proxy.exe").Length
          echo "SHA256: $hash"
          echo "Size: $size bytes"
          echo "$hash" > "dist/servicebox-proxy.exe.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/servicebox-proxy.exe
            dist/servicebox-proxy.exe.sha256
          generate_release_notes: true
